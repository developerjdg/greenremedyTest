<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/slider.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <section class="section-4">
        <div class="w-layout-blockcontainer container-large follow-us-container w-container">
            <h2>follow us</h2>
            <div>
                <ul role="list" class="list">
                    <li class="list-item">
                        <img src="https://cdn.prod.website-files.com/649be4ccd4cd802a7c9fed46/67f4aa78c82dda32c0c3472d_image%20(4).png"
                            loading="lazy" alt="Instagram Logo_Green Remedy Dispensary in richmond" class="image-16">
                            <a href="#" class="link-6">510GreenRemedy</a>
                    </li>
                    <li class="list-item">
                        <a href="#" class="link-6">510GreenRemedy</a>
                    </li>
                </ul>
            </div>
            <div class="follow-slider">
                <div data-delay="4000" data-animation="slide" class="slider-2 w-slider" data-autoplay="true"
                    data-easing="ease" data-hide-arrows="false" data-disable-swipe="false" data-autoplay-limit="0"
                    data-nav-spacing="5" data-duration="500" data-infinite="false" role="region" aria-label="carousel">
                    <div class="left-arrow-3 w-slider-arrow-left" role="button" tabindex="0"
                        aria-controls="w-slider-mask-1" aria-label="previous slide">
                        <div class="icon-3 w-icon-slider-left"></div>
                    </div>
                    <div class="right-arrow-3 w-slider-arrow-right" role="button" tabindex="0"
                        aria-controls="w-slider-mask-1" aria-label="next slide">
                        <div class="icon-2 slide-arrow w-icon-slider-right"></div>
                    </div>
                    <div class="slide-nav-3 w-slider-nav w-round">
                        <div class="w-slider-dot" data-wf-ignore="" aria-label="Show slide 1 of 2" aria-pressed="false"
                            role="button" tabindex="-1" style="margin-left: 5px; margin-right: 5px;"></div>
                        <div class="w-slider-dot w-active" data-wf-ignore="" aria-label="Show slide 2 of 2"
                            aria-pressed="true" role="button" tabindex="0" style="margin-left: 5px; margin-right: 5px;">
                        </div>
                    </div>
                </div>
            </div>
            <div class="code-embed-7 w-embed w-script">
                <div class="grx-slider-wrapper">
                    <div class="grx-slider-track" id="grxSliderTrack"
                        style="transform: translateX(-964.5px); transition: transform 0.6s ease-in-out;">

                        <div class="grx-slide-item">
                            <img
                                src="res/slide-1.avif">
                        </div>

                        <div class="grx-slide-item">
                            <img
                                src="res/slide-2.avif">
                        </div>

                        <div class="grx-slide-item">
                            <img
                                src="res/slide-3.avif">
                        </div>

                        <div class="grx-slide-item">
                            <img
                                src="res/slide-4.jpg">
                        </div>
                        <div class="grx-slide-item">
                            <img
                                src="res/slide-1.avif">
                        </div>
                        <div class="grx-slide-item">
                            <img
                                src="res/slide-2.avif">
                        </div>
                        <div class="grx-slide-item">
                            <img
                                src="res/slide-3.avif">
                        </div>
                        <div class="grx-slide-item">
                            <img
                                src="res/slide-4.jpg">
                        </div>
                    </div>
                    <!-- Arrows (Mobile Only) -->
                    <button class="grx-arrow grx-arrow-left">❮</button>
                    <button class="grx-arrow grx-arrow-right">❯</button>

                    <!-- Dots -->
                    <div class="grx-dots">
                        <span class="grx-dot"></span>
                        <span class="grx-dot"></span>
                        <span class="grx-dot"></span>
                        <span class="grx-dot grx-active"></span>
                    </div>
                </div>
    </section>
</body>
</html>
