<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>shop - Green Remedy</title>
    <link rel="stylesheet" href="css/shop.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/footer.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css"
        integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
</head>

<body>
    <div id="navbar-container"></div>
    <!-- ===== AGEGATE ===== -->
    <section id="agegate"></section>
    <section class="shop-banner">
        <div class="shop-banner-inner">
            <h1 class="shop-title">
                Weed Dispensary Shop In Richmond - Green Remedy
            </h1>
        </div>
    </section>

    <section>
        <div class="shop-container">
            <div class="frame">
                <div class="main-frame">
                    <script src="https://sweede.io/embed/green-remedy" type="text/javascript" defer=""></script>
                    <style>
                        iframe {
                            width: 100%;
                            height: 100vh;
                            /* fallback for basic compatibility */
                            margin: 0;
                            padding: 0;
                            border: none;
                            display: block;
                        }
                    </style>
                </div>
            </div>
        </div>
    </section>

    <section id="follow"></section>
    <section id="footer-container"></section>
    <script src="script/navabar.js"></script>
    <script src="script/slider.js"></script>
    <script>
        fetch("navbar.html")
            .then((res) => res.text())
            .then((data) => {
                document.getElementById("navbar-container").innerHTML = data;

                initMobileMenu();
            });
        fetch("slider.html")
            .then((res) => res.text())
            .then((data) => {
                document.getElementById("follow").innerHTML = data;
                initSlider();
            });
        fetch("footer.html")
            .then((res) => res.text())
            .then((data) => {
                document.getElementById("footer-container").innerHTML = data;
            });
    </script>
</body>

</html>
